name: Deploy

# Manual trigger only — the actual platform-side deploys (Vercel, Railway,
# Fly.io) are driven by their own webhooks against the image tag we push
# here. Bumping the version on main keeps the npm-style version in sync
# with the image tag for `--version` flags and Sentry releases.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9.12.0
  REGISTRY: ghcr.io

jobs:
  bump-version:
    name: Bump version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump root package.json version
        id: bump
        run: |
          # pnpm version respects the workspace root but doesn't touch the
          # apps' versions, which is what we want — only the root version
          # is the deployable artifact identifier.
          new_version=$(pnpm --silent version ${{ github.event.inputs.bump }} --no-git-tag-version | tail -n1)
          # `pnpm version` doesn't print `v`-prefixed semver consistently
          # across versions; normalize.
          new_version="${new_version#v}"
          tag="v${new_version}"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore(release): ${tag}"
          git tag -a "${tag}" -m "Release ${tag}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${GITHUB_REF#refs/heads/}
          git push origin "${{ steps.bump.outputs.tag }}"

  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: bump-version
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, worker, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=raw,value=${{ needs.bump-version.outputs.tag }}
            type=raw,value=${{ github.event.inputs.environment }}-latest
            type=sha,format=long

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENTRY_RELEASE=${{ needs.bump-version.outputs.tag }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [bump-version, build-and-push]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: ${{ needs.bump-version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.environment == 'staging' }}
